<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#070c1a" />
    </linearGradient>

    <!-- Glowing Cyan/Blue Accents -->
    <radialGradient id="glow" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" stroke-opacity="0.4" />
    </pattern>

    <!-- Card Glass Gradient -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8" />
    </linearGradient>

    <linearGradient id="badgeGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGradient)" rx="20" />
  <rect width="1500" height="500" fill="url(#gridPattern)" rx="20" />
  <rect width="1500" height="500" fill="url(#glow)" rx="20" />
  <rect width="1500" height="500" fill="url(#glowRight)" rx="20" />

  <!-- Outer Frame Border -->
  <rect x="2" y="2" width="1496" height="496" fill="none" stroke="#334155" stroke-width="2" rx="18" stroke-opacity="0.6" />

  <!-- Background Faint Code Lines -->
  <g font-family="Fira Code, Consolas, Monaco, monospace" font-size="14" fill="#334155" opacity="0.35">
    <text x="70" y="80">const developer = { name: "Inderjeet Singh", exp: "8+ Years" };</text>
    <text x="70" y="105">async function buildScalableApp(stack) {</text>
    <text x="90" y="130">const service = await Microservice.deploy({ cloud: "AWS", auth: "JWT" });</text>
    <text x="90" y="155">return service.optimizePerformance();</text>
    <text x="70" y="180">}</text>
  </g>

  <!-- Connecting Nodes / Circuit Lines -->
  <g stroke="#38bdf8" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M 520 180 L 640 180 L 700 240 L 780 240" stroke-dasharray="4,4" />
    <path d="M 440 370 L 580 370 L 650 310 L 780 310" />
    <circle cx="700" cy="240" r="4" fill="#38bdf8" />
    <circle cx="650" cy="310" r="4" fill="#06b6d4" />
  </g>

  <!-- LEFT COLUMN CONTENT -->

  <!-- Top Pill Badge -->
  <g transform="translate(80, 160)">
    <rect width="250" height="32" rx="16" fill="#1e3a8a" fill-opacity="0.4" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6" />
    <circle cx="20" cy="16" r="4" fill="#38bdf8" />
    <text x="34" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" letter-spacing="1">SENIOR FULL STACK ENGINEER</text>
  </g>

  <!-- Main Name Header -->
  <text x="80" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Inderjeet Singh</text>

  <!-- Subtitle -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="700" fill="#38bdf8">Senior Full Stack Developer</text>

  <!-- Tagline -->
  <text x="80" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Building Scalable Web Applications</text>

  <!-- Bottom Badges -->
  <g transform="translate(80, 360)">
    <!-- Badge 1: 8+ YOE -->
    <g transform="translate(0, 0)">
      <rect width="115" height="38" rx="10" fill="url(#badgeGlass)" stroke="#334155" stroke-width="1" />
      <text x="18" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">⚡ 8+ YOE</text>
    </g>
    <!-- Badge 2: Cloud & DevOps -->
    <g transform="translate(130, 0)">
      <rect width="165" height="38" rx="10" fill="url(#badgeGlass)" stroke="#334155" stroke-width="1" />
      <text x="18" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">☁️ Cloud &amp; DevOps</text>
    </g>
    <!-- Badge 3: Microservices API -->
    <g transform="translate(310, 0)">
      <rect width="175" height="38" rx="10" fill="url(#badgeGlass)" stroke="#334155" stroke-width="1" />
      <text x="18" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">🚀 Microservices API</text>
    </g>
  </g>


  <!-- RIGHT COLUMN CONTENT: IDE Glass Window -->
  <g transform="translate(780, 75)">
    <!-- Window Container -->
    <rect width="640" height="350" rx="16" fill="url(#glassCard)" stroke="#334155" stroke-width="1.5" />
    
    <!-- Window Title Bar -->
    <path d="M 0 16 Q 0 0 16 0 L 624 0 Q 640 0 640 16 L 640 42 L 0 42 Z" fill="#0f172a" fill-opacity="0.8" />
    <line x1="0" y1="42" x2="640" y2="42" stroke="#334155" stroke-width="1" />

    <!-- Window Dots -->
    <circle cx="24" cy="21" r="6" fill="#ef4444" />
    <circle cx="44" cy="21" r="6" fill="#f59e0b" />
    <circle cx="64" cy="21" r="6" fill="#10b981" />

    <!-- Window Title -->
    <text x="320" y="26" font-family="Fira Code, Consolas, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">tech-stack-architecture.ts</text>

    <!-- TECH CARDS GRID -->
    
    <!-- ROW 1 -->
    <!-- NestJS -->
    <g transform="translate(24, 62)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <path d="M 66 82 L 66 94" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="2,2" />
      <!-- Red Cat/Nest Icon -->
      <polygon points="66,22 76,34 71,48 61,48 56,34" fill="#ea2845" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">NestJS</text>
    </g>

    <!-- Node.js -->
    <g transform="translate(174, 62)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- Hexagon Node Icon -->
      <polygon points="66,22 76,28 76,40 66,46 56,40 56,28" fill="#22c55e" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Node.js</text>
    </g>

    <!-- Next.js -->
    <g transform="translate(324, 62)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- Next N Icon -->
      <circle cx="66" cy="34" r="12" fill="#ffffff" />
      <text x="66" y="39" font-family="-apple-system, sans-serif" font-size="13" font-weight="900" fill="#0f172a" text-anchor="middle">N</text>
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Next.js</text>
    </g>

    <!-- React -->
    <g transform="translate(474, 62)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- React Atom Icon -->
      <ellipse cx="66" cy="34" rx="12" ry="5" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(30 66 34)" />
      <ellipse cx="66" cy="34" rx="12" ry="5" fill="none" stroke="#61dafb" stroke-width="1.5" transform="rotate(-30 66 34)" />
      <circle cx="66" cy="34" r="2.5" fill="#61dafb" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">React</text>
    </g>

    <!-- ROW 2 -->
    <!-- TypeScript -->
    <g transform="translate(24, 154)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <rect x="54" y="24" width="24" height="20" rx="4" fill="#3178c6" />
      <text x="66" y="39" font-family="sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">TS</text>
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">TypeScript</text>
    </g>

    <!-- Laravel -->
    <g transform="translate(174, 154)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <path d="M 66 22 L 74 34 L 66 44 L 58 34 Z" fill="#ff2d20" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Laravel</text>
    </g>

    <!-- Docker -->
    <g transform="translate(324, 154)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- Whale icon -->
      <rect x="56" y="30" width="20" height="10" rx="3" fill="#2496ed" />
      <circle cx="72" cy="32" r="1.5" fill="#ffffff" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Docker</text>
    </g>

    <!-- AWS / Azure -->
    <g transform="translate(474, 154)">
      <rect width="132" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- Cloud icon -->
      <path d="M 58 36 A 6 6 0 0 1 66 28 A 8 8 0 0 1 78 34 A 5 5 0 0 1 74 40 L 58 40 Z" fill="#ffffff" />
      <text x="66" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">AWS / Azure</text>
    </g>

    <!-- ROW 3 -->
    <!-- Redis Cache -->
    <g transform="translate(24, 246)">
      <rect width="180" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <polygon points="114,24 106,36 112,36 104,46 118,32 110,32" fill="#eab308" />
      <text x="114" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">⚡ Redis Cache</text>
    </g>

    <!-- MySQL -->
    <g transform="translate(222, 246)">
      <rect width="180" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <!-- Dolphin wave -->
      <path d="M 104 38 Q 114 24 124 38" fill="none" stroke="#00758f" stroke-width="3" stroke-linecap="round" />
      <text x="114" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">🐬 MySQL</text>
    </g>

    <!-- MongoDB -->
    <g transform="translate(420, 246)">
      <rect width="186" height="78" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <path d="M 113 22 Q 123 32 113 46 Q 103 32 113 22 Z" fill="#22c55e" />
      <text x="113" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">🍃 MongoDB</text>
    </g>

  </g>

</svg>
